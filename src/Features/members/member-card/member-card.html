@if (member(); as member) {
  <div
    [routerLink]="['/members', member.id]"
    class="relative cursor-pointer overflow-hidden rounded-xl
           shadow-md transition hover:-translate-y-2 bg-white gap-y-20">

    <!-- Image -->
    <img

      [src]="member.imageUrl || '/user.webp'"
      alt="{{member.displayName}} image"
      class="h-80 w-full object-cover"
    />
    <button (click)="toggleLike($event)" class="absolute top-1 right-1 z-45 btn btn-ghost btn-circle">
    <svg xmlns="http://www.w3.org/2000/svg" [attr.fill]="hasLiked() ? 'red':'none'"
     viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor"
     className="size-7"
     
     >
  <path strokeLinecap="round" strokeLinejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
</svg>
    
    </button>

    <!-- Text directly on image -->
    <div class="absolute bottom-3 left-3 text-white">
      <p class="text-lg font-semibold drop-shadow-lg">
        {{ member.displayName }},{{member.dateOfBirth | age}}
      </p>
      <p class="text-sm drop-shadow-lg">
        {{ member.city }}
      </p>
    </div>
  </div>
}
